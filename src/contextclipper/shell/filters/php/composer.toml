[filter]
name = "composer-install"
description = "Compress Composer install/update output, dropping per-package progress and keeping errors and summaries"

[[filter.patterns]]
match_command = "^composer\\s+(install|update|require|remove|dump-autoload|show)"

[[filter.rules]]
description = "Drop per-package installing/upgrading lines — too verbose for agent context"
type = "drop_matching"
pattern = "^  - (Installing|Upgrading|Downgrading|Removing) .+ \\("

[[filter.rules]]
description = "Drop repository loading header"
type = "drop_matching"
pattern = "^Loading composer repositories"

[[filter.rules]]
description = "Drop generic 'Updating dependencies' message"
type = "drop_matching"
pattern = "^Updating dependencies$"

[[filter.rules]]
description = "Drop lock file operations header"
type = "drop_matching"
pattern = "^Lock file operations:"

[[filter.rules]]
description = "Drop 'Nothing to install' when result is already up to date"
type = "drop_matching"
pattern = "^Nothing to install"

[[filter.rules]]
description = "Drop package operations count line"
type = "drop_matching"
pattern = "^Package operations:"

[[filter.rules]]
description = "Drop blank lines"
type = "drop_matching"
pattern = "^\\s*$"

[[filter.rules]]
description = "Keep error lines, constraint problems, and requirement summaries"
type = "keep_matching"
pattern = "^(\\[ERROR\\]|Problem |Your requirements|  - Root|  - \\w+ \\d|Generating autoload|Writing lock file|No composer.lock)"
priority = 10

[filter.on_failure]
[[filter.on_failure.rules]]
description = "On failure, keep all error/problem lines for conflict resolution"
type = "keep_matching"
pattern = "^(\\[ERROR\\]|Problem |Your requirements|  - |  > |cannot install|conflict|failed)"
priority = 5
